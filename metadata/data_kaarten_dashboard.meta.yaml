indicators:
  Gemiddelde.verandering.energiequote.(absoluut):
    title: Gemiddelde afname energiequote van huishoudens met energiearmoede
    description: Deze indicator laat zien hoeveel de energiequote van huishoudens in energiearmoede gemiddeld afneemt in een gemodelleerde what-if-situatie waarin de woning wordt geïsoleerd tot de isolatiestandaard. De grootte van de afname verschilt per gemeente, voornamelijk vanwege de verschillen in woninggrootte, woningtype, inkomens en warmtevraag. 
    legend: Afname in procentpunt
    theme: Woningverduurzaming
    subject: Isolatie naar de standaard bij energiearmoede
    unit: "%"
    precision: 1
    visualization_type: map_with_timegraph_per_area
    link: https://esb.nu/isolatie-slechtst-geisoleerde-woningen-drukt-gasverbruik-en-energiearmoede/
    test_values:
      Amsterdam: -3.89
      Wassenaar: -4.07
      Amersfoort: -3.69
      Oldambt: -6.48

  Verandering.percentage.boven.8%.(tov.lihelek):
    title: Afname aandeel huishoudens met energiearmoede met een energiequote van meer dan acht procent
    description: Deze indicator toont  de afname in de frequentie van huishoudens met energiearmoede in een gemodelleerde what-if-situatie waarin de woningen worden geïsoleerd tot de isolatiestandaard. De grootste dalingen in het lokale aandeel huishoudens met energiearmoede zijn met name te vinden gemeentes in de Randstad. In gemeenten als Den Haag en Amsterdam leven veel huishoudens rond de energiearmoedegrens; woningisolatie brengt hun energiequote naar onder de acht procent. 
    legend: Afname in procentpunt
    theme: Woningverduurzaming
    subject: Isolatie naar de standaard bij energiearmoede
    unit: "%"
    precision: 1
    visualization_type: map
    link: https://esb.nu/isolatie-slechtst-geisoleerde-woningen-drukt-gasverbruik-en-energiearmoede/
    test_values:
      Amsterdam: 49.04
      Wassenaar: 34.74
      Amersfoort: 39.03
      Oldambt: 32.87

  Gemiddelde.investeringskosten.(EUR):
    title: Gemiddelde investeringskosten voor huishoudens met energiearmoede
    description: Deze kaart toont de gemiddelde investeringskosten per woning voor het isoleren naar de isolatiestandaard van woningen met huishoudens met een laag inkomen en met een hoge energierekening óf een woning van lage energetische kwaliteit. 
    legend: euro
    theme: Woningverduurzaming
    subject: Isolatie naar de standaard bij energiearmoede
    unit: " euro"
    precision: 0
    visualization_type: map
    link: https://esb.nu/isolatie-slechtst-geisoleerde-woningen-drukt-gasverbruik-en-energiearmoede/
    test_values:
      Amsterdam: 8954.00
      Wassenaar: 12957.05
      Amersfoort: 10093.42
      Oldambt: 13831.42
  
  Gemiddeld.gas.bespaard.per.euro.(m3/EUR):
    title: Gemiddelde gasbesparing per geïnvesteerde euro van huishoudens met energiearmoede
    description: Deze kaart toont de gemiddelde gasbesparing per geïnvesteerde euro in isoleren naar de isolatiestandaard van woningen met huishoudens met een laag inkomen en met een hoge energierekening óf een woning van lage energetische kwaliteit.
