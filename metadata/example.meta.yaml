# The input in the yaml metadata files determines how the indicators are shown in the dashboard. 
# It defines which indicators are shown in the dashboard and how each one should be visualized (type of graph, text, classification...)
# Each datafile should have its own corresponding yaml metadata file
# The name of the metadata yaml file should be the same as the data file and end with .meta.yaml

# [Name of the data file without extension]
dataset_id: data_kaarten_dashboard 

# [Name of the column that determines the level at which the data is shown]
key: gemeentenaam 

# [Filters / options. The column or columns that determine sub-selections or subpopulations, if applicable]
options:
  - Eigendomstype
  - Woningtype

# [Version of the CBS gemeente/wijk/buurt layout]
gwb_version: 2019_v3 

# [Name of the layer in the CBS gwb file containing the geometry]
layer_naam: cbs_wijken_2019 

indicators:

  # [Name of the column of indicator no. 1]:
  Gemiddelde.verandering.energiequote.(absoluut):

    # [Title of indicator no. 1]
    title: Gemiddelde afname energiequote van huishoudens met energiearmoede 
    
    # [Description / explanation of indicator no. 1]
    description: Deze indicator laat zien hoeveel de energiequote van huishoudens in energiearmoede gemiddeld afneemt in een gemodelleerde what-if-situatie waarin de woning wordt geïsoleerd tot de isolatiestandaard. De grootte van de afname verschilt per gemeente, voornamelijk vanwege de verschillen in woninggrootte, woningtype, inkomens en warmtevraag.

    # [Title of the legend of indicator no. 1]
    legend: Afname in procentpunt 
    
    # [High-level topic of indicator no. 1]
    theme: Woningverduurzaming

    # [Sub-category within the theme of indicator no. 1]
    subject: Isolatie naar de standaard bij energiearmoede 

    #De unit die achter de waarde komt te staan in de kaart (bijvoorbeeld: 100 -> 100 euro)
    unit: " euro"
    
    # [Number of decimals to display for indicator no. 1]
    precision: 1 
    
    # [Type of visualization:]
    #   Map: a map that the user can hover over to see the value in each municipality
    #   Map_with_timegraph_per_area: the map, but the user can click on a municipality to see how values evolved over time
    visualization_type: map_with_timegraph_per_area

    # [Link to publication]
    link: https://esb.nu/isolatie-slechtst-geisoleerde-woningen-drukt-gasverbruik-en-energiearmoede/

    # [Expected values for 4 reference municipalities, rounded to 2 decimals]
    test_values:
      Amsterdam: -3.89
      Wassenaar: -4.07
      Amersfoort: -3.69
      Oldambt: -6.48

  # [Name of the column of indicator no. 2]:
  Gemiddelde.investeringskosten.(EUR):
    title: Gemiddelde investeringskosten voor huishoudens met energiearmoede
    description: Deze kaart toont de gemiddelde investeringskosten per woning voor het isoleren naar de isolatiestandaard van woningen met huishoudens met een laag inkomen en met een hoge energierekening óf een woning van lage energetische kwaliteit. 
    legend: euro
    theme: Woningverduurzaming
    subject: Isolatie naar de standaard bij energiearmoede
    unit: " euro"
    precision: 0
    visualization_type: map_with_timegraph_per_area
    link: https://esb.nu/isolatie-slechtst-geisoleerde-woningen-drukt-gasverbruik-en-energiearmoede/
    test_values:
      Amsterdam: 8954.00
      Wassenaar: 12957.05
      Amersfoort: 10093.42
      Oldambt: 13831.42

  # etc.